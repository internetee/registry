# spec 13: the registrant timeline for domains(:mytenure) (item_id = identify(:mytenure)).
# john == users(:registrant); jane is the "other" (prior/intervening) owner.
#   [2020-01-01, 2021-01-01) jane   (prior owner)
#   [2021-01-01, 2022-01-01) john   (caller interval s1..e1)   -> AC4/AC5 boundary
#   [2022-01-01, 2023-01-01) jane   (intervening owner)        -> AC6/AC7 excluded
#   [2023-01-01, now)        john   (caller re-acquired, live) -> AC7 second interval
