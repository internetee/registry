# spec 13 FAIL-CLOSED regression: john CURRENTLY owns this domain (registrant: john) but its
# log_domains timeline NEVER records john becoming registrant — the only recorded registrant is
# the prior owner (jane). The old fail-OPEN code anchored the live tail to rows.first (2020) and
# leaked jane's prior-tenure access event; the fail-closed fix emits NO interval here.
orphan:
  name: orphan.test
  name_puny: orphan.test
  name_dirty: orphan.test
  registrar: spec13_registrar
  registrant: john
  transfer_code: 7be21ac
