# Subject form is the dash-free, country-prefixed eeID subject (EE38001085718),
# matching users.subject — NOT the dashed registrant_ident form.

police_active:
  eeid_subject: EE38001085718
  full_name: Police Officer One
  legal_basis_ref: MoU-2026-001
  category: police
  organization: police
  status: active
  valid_from: <%= 10.days.ago.to_s(:db) %>
  valid_until:
  uuid: a1b2c3d4-0000-0000-0000-000000000001

# Same subject as police_active, but a NEWER valid_from — this one must win the
